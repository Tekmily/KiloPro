<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepatoFit OS - Professional Health Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { --accent: #00ff9d; --bg: #05070a; --glass: rgba(15, 20, 30, 0.9); }
        body { background-color: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #00ff9d15 0%, transparent 70%); }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        
        .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .nav-dot.active { width: 24px; border-radius: 10px; background: var(--accent); }

        /* Card Animation */
        .meal-card { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .meal-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        #share-card-area {
            background: linear-gradient(135deg, #05070a 0%, #0f172a 100%);
            padding: 40px; border-radius: 30px; width: 400px; position: fixed; left: -1000px;
        }

        .music-player { border-top: 1px solid rgba(0,255,157,0.2); background: rgba(0,0,0,0.5); }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen hero-gradient flex flex-col items-center">

    <div id="setup-screen" class="fixed inset-0 z-[500] bg-black flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="w-full max-w-md glass-panel p-10 text-center border-emerald-500/30">
            <div class="mb-6 flex justify-center">
                <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center border border-emerald-500/50">
                    <i class="fas fa-microchip text-3xl text-emerald-400"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold tracking-tighter mb-2 italic">HEPATOFIT <span class="text-emerald-500">AI</span></h1>
            <p class="text-gray-400 text-xs mb-8 uppercase tracking-widest">Profesyonel Karaciğer Rejenerasyon Sistemi</p>
            
            <div class="space-y-4">
                <input type="text" id="uName" placeholder="Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-emerald-500 outline-none transition">
                <div class="flex gap-4">
                    <input type="number" id="uHeight" placeholder="Boy (cm)" class="w-1/2 bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                    <input type="number" id="uWeight" placeholder="Kilo (kg)" class="w-1/2 bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                </div>
                <div class="flex gap-4">
                    <select id="uGender" class="w-1/2 bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                        <option value="female">Kadın</option>
                        <option value="male">Erkek</option>
                    </select>
                    <input type="number" id="uAge" placeholder="Yaş" class="w-1/2 bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                </div>
                <button onclick="logic.init()" class="w-full bg-emerald-500 p-5 rounded-xl font-bold text-black uppercase tracking-widest hover:bg-emerald-400 transition transform active:scale-95 shadow-xl shadow-emerald-500/20">Sistemi Aktive Et</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-4xl flex flex-col min-h-screen lg:flex-row gap-6 p-4 lg:p-10">
        
        <aside class="w-full lg:w-80 flex flex-col gap-6">
            <div class="glass-panel p-8 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4">
                    <button onclick="ui.editProfile()" class="text-gray-500 hover:text-emerald-500"><i class="fas fa-cog"></i></button>
                </div>
                <div id="p-avatar" class="w-20 h-20 bg-gradient-to-tr from-emerald-500 to-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center text-3xl font-bold shadow-2xl"></div>
                <h2 id="p-name" class="text-xl font-bold italic tracking-tight">--</h2>
                <div id="p-bmi-tag" class="inline-block px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-full text-[10px] font-bold mt-2">--</div>
                
                <div class="grid grid-cols-2 gap-4 mt-8">
                    <div class="text-left"><p class="text-[9px] text-gray-500 uppercase font-bold">Hedef</p><p class="text-sm font-bold text-emerald-500" id="target-weight">-- kg</p></div>
                    <div class="text-left"><p class="text-[9px] text-gray-500 uppercase font-bold">Kalan</p><p class="text-sm font-bold text-white" id="weight-left">-- kg</p></div>
                </div>
            </div>

            <div class="glass-panel p-6 music-player">
                <p class="text-[10px] text-emerald-500 font-bold uppercase mb-4 tracking-tighter"><i class="fas fa-play mr-2"></i>Spor Motivasyon Radyosu</p>
                <div id="player-container" class="rounded-xl overflow-hidden aspect-video mb-4">
                    <iframe id="yt-player" width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PL4fGSI1pDJn6jWnvJZ_S7WbVf0vEw7Z-k&autoplay=0&controls=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="text-[10px] text-gray-500 italic">Reklamsız spor mixleri listeleniyor...</div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col gap-6">
            <div class="flex justify-between items-center px-2">
                <div>
                    <h3 class="text-2xl font-bold italic" id="day-title">Gün 1</h3>
                    <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Karaciğer Detoks Takvimi</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="ui.share()" class="w-10 h-10 glass-panel flex items-center justify-center text-emerald-400 hover:bg-emerald-400 hover:text-black transition"><i class="fas fa-share-alt"></i></button>
                    <button onclick="logic.nextDay()" class="px-6 py-2 bg-white text-black rounded-full font-bold text-xs uppercase hover:bg-emerald-500 transition">Yarına Geç</button>
                </div>
            </div>

            <div id="card-list" class="space-y-4">
                </div>
        </main>

    </div>

    <div id="share-card-area">
        <h1 style="color:#00ff9d; font-size:24px; margin-bottom:5px;">HEPATOFIT OS</h1>
        <p id="s-date" style="color:#666; font-size:12px; margin-bottom:30px;"></p>
        <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px;">
            <p style="color:#666; font-size:10px; text-transform:uppercase;">Bugünkü Başarı</p>
            <h2 id="s-completion" style="color:white; font-size:32px; font-weight:bold;">%0</h2>
            <div id="s-tasks" style="margin-top:20px; color:#aaa; font-size:14px;"></div>
        </div>
        <p style="margin-top:40px; color:#00ff9d; font-size:10px; letter-spacing:2px; text-align:center;">AI POWERED HEALTH ASSISTANT</p>
    </div>

    <script>
        const logic = {
            user: JSON.parse(localStorage.getItem('hf_os_user')),
            status: JSON.parse(localStorage.getItem('hf_os_status')) || { day: 1, completed: [], weights: [] },
            
            // Profesyonel Karaciğer Dostu Menü Havuzu
            menuPool: {
                breakfast: [
                    { t: "Kolin Bombası", l: ["3 Haşlanmış Yumurta", "100g Az Yağlı Lor", "Dereotu"], v: "https://images.unsplash.com/photo-1525351484163-7529414344d8?auto=format&fit=crop&w=400" },
                    { t: "Yeşil Enerji", l: ["Yulaflı Omlet (2 Yumurta)", "1/2 Avokado", "Bol Roka"], v: "https://images.unsplash.com/photo-1513442542250-854d436a73f2?auto=format&fit=crop&w=400" }
                ],
                sport: [
                    { t: "HIIT Kardiyo", l: ["30 Dakika Orta Tempo Yürüyüş", "10 Dakika Esneme"], v: "https://images.unsplash.com/photo-1538805060514-97d9cc17730c?auto=format&fit=crop&w=400" },
                    { t: "Metabolik Ateşleme", l: ["15 Dakika İp Atlama veya Evde Step", "5 Dakika Derin Nefes"], v: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=400" }
                ],
                lunch: [
                    { t: "Sülfür Temizliği", l: ["200g Izgara Tavuk", "Haşlanmış Brokoli", "Sarımsaklı Yoğurt"], v: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=400" },
                    { t: "Omega Rejenerasyon", l: ["Izgara Somon veya Mezgit", "Bol Limonlu Yeşil Salata"], v: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=400" }
                ],
                dinner: [
                    { t: "Enginar Kür", l: ["Zeytinyağlı Enginar", "2 Kaşık Karabuğday", "Salatalık"], v: "https://images.unsplash.com/photo-1511690656952-34342bb7c2f2?auto=format&fit=crop&w=400" }
                ]
            },

            init() {
                const data = {
                    name: document.getElementById('uName').value,
                    height: parseInt(document.getElementById('uHeight').value),
                    weight: parseInt(document.getElementById('uWeight').value),
                    gender: document.getElementById('uGender').value,
                    age: parseInt(document.getElementById('uAge').value)
                };
                if(!data.name || !data.weight) return alert("Lütfen verileri eksiksiz girin.");
                
                this.user = data;
                this.status.weights.push({ d: 1, w: data.weight });
                localStorage.setItem('hf_os_user', JSON.stringify(this.user));
                localStorage.setItem('hf_os_status', JSON.stringify(this.status));
                this.render();
            },

            render() {
                if(!this.user) return;
                document.getElementById('setup-screen').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('main-app').classList.remove('hidden');
                
                // Profile Sidebar
                document.getElementById('p-name').innerText = this.user.name;
                document.getElementById('p-avatar').innerText = this.user.name[0].toUpperCase();
                const bmi = (this.user.weight / ((this.user.height/100)**2)).toFixed(1);
                document.getElementById('p-bmi-tag').innerText = `BMI: ${bmi} | ${this.getBMICat(bmi)}`;
                
                const target = this.user.gender === 'male' ? (this.user.height - 100) * 0.9 : (this.user.height - 100) * 0.85;
                document.getElementById('target-weight').innerText = `${target.toFixed(1)}`;
                document.getElementById('weight-left').innerText = `${(this.user.weight - target).toFixed(1)}`;

                document.getElementById('day-title').innerText = `Gün ${this.status.day}`;
                this.renderCards();
            },

            renderCards() {
                const container = document.getElementById('card-list');
                container.innerHTML = '';
                const seed = (this.status.day + this.user.weight) % 2;
                
                const dailyTasks = [
                    { type: 'breakfast', ...this.menuPool.breakfast[seed], h: "09:00" },
                    { type: 'sport', ...this.menuPool.sport[seed], h: "11:00" },
                    { type: 'lunch', ...this.menuPool.lunch[seed], h: "14:00" },
                    { type: 'dinner', ...this.menuPool.dinner[0], h: "19:00" }
                ];

                dailyTasks.forEach((task, i) => {
                    const isDone = this.status.completed.includes(`${this.status.day}-${i}`);
                    const card = document.createElement('div');
                    card.className = `meal-card glass-panel p-6 flex gap-6 items-center ${isDone ? 'opacity-50 border-emerald-500/50' : ''}`;
                    card.onclick = () => this.toggleTask(i);
                    card.innerHTML = `
                        <div class="w-24 h-24 rounded-2xl overflow-hidden hidden sm:block">
                            <img src="${task.v}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <p class="text-[10px] text-emerald-500 font-bold uppercase mb-1 tracking-tighter">${task.h} • ${task.type.toUpperCase()}</p>
                                ${isDone ? '<i class="fas fa-check-circle text-emerald-500"></i>' : ''}
                            </div>
                            <h4 class="text-xl font-bold italic">${task.t}</h4>
                            <p class="text-xs text-gray-400 mt-2">${task.l.join(" • ")}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            },

            toggleTask(id) {
                const key = `${this.status.day}-${id}`;
                if(this.status.completed.includes(key)) {
                    this.status.completed = this.status.completed.filter(k => k !== key);
                } else {
                    this.status.completed.push(key);
                }
                localStorage.setItem('hf_os_status', JSON.stringify(this.status));
                this.render();
            },

            nextDay() {
                const newWeight = prompt("Bugünkü kilonuzu girin (Değişmediyse boş bırakın):", this.user.weight);
                if(newWeight) {
                    this.user.weight = parseFloat(newWeight);
                    this.status.weights.push({ d: this.status.day, w: this.user.weight });
                    localStorage.setItem('hf_os_user', JSON.stringify(this.user));
                }
                this.status.day++;
                localStorage.setItem('hf_os_status', JSON.stringify(this.status));
                location.reload();
            },

            getBMICat(bmi) {
                if(bmi < 18.5) return "Zayıf";
                if(bmi < 25) return "Normal";
                if(bmi < 30) return "Fazla Kilolu";
                return "Obezite";
            }
        };

        const ui = {
            editProfile() {
                if(confirm("Profil bilgilerini güncellemek istiyor musunuz?")) {
                    localStorage.removeItem('hf_os_user');
                    location.reload();
                }
            },
            async share() {
                const area = document.getElementById('share-card-area');
                document.getElementById('s-date').innerText = `GÜN ${logic.status.day} ÖZETİ`;
                const tasksDone = logic.status.completed.filter(k => k.startsWith(`${logic.status.day}-`)).length;
                const completion = Math.round((tasksDone / 4) * 100);
                document.getElementById('s-completion').innerText = `%${completion}`;
                
                html2canvas(area, { backgroundColor: '#05070a' }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Hepatofit-Day-${logic.status.day}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            }
        };

        if(logic.user) logic.render();
    </script>
</body>
</html>
