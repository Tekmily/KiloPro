<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepatoFit Elite - Personal Health OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --emerald: #10b981; --sapphire: #3b82f6; --dark: #070910; }
        body { background: var(--dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .card-wrapper { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; width: 100%; max-width: 500px; margin: 0 auto; height: 550px; }
        .meal-card { position: absolute; inset: 1rem; border-radius: 2.5rem; padding: 1.5rem; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none; display: flex; flex-direction: column; overflow: hidden; }
        .meal-card.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; z-index: 10; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .modal { transition: 0.3s ease; opacity: 0; pointer-events: none; }
        .modal.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="profile-modal" class="modal fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] relative">
            <button onclick="ui.toggleProfile(false)" class="absolute top-6 right-6 text-gray-400"><i class="fas fa-times"></i></button>
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Profilimi Güncelle</h2>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-gray-500 ml-2">İSİM</label><input type="text" id="edit-name" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 focus:border-emerald-500"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-[10px] font-bold text-gray-500 ml-2">BOY (cm)</label><input type="number" id="edit-height" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10"></div>
                    <div class="flex-1"><label class="text-[10px] font-bold text-gray-500 ml-2">KİLO (kg)</label><input type="number" id="edit-weight" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10"></div>
                </div>
                <button onclick="logic.updateProfile()" class="w-full bg-emerald-500 p-4 rounded-2xl font-black mt-4 shadow-lg shadow-emerald-500/20">DEĞİŞİKLİKLERİ KAYDET</button>
            </div>
        </div>
    </div>

    <div id="setup-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-emerald-500/20">
            <h1 class="text-3xl font-black mb-6 tracking-tighter uppercase text-emerald-500">HEPATOFIT</h1>
            <div class="space-y-4">
                <input type="text" id="uName" placeholder="Adınız" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                <div class="flex gap-2">
                    <input type="number" id="uHeight" placeholder="Boy" class="w-1/2 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                    <input type="number" id="uWeight" placeholder="Kilo" class="w-1/2 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                </div>
                <select id="uGender" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                    <option value="male">Erkek</option>
                    <option value="female">Kadın</option>
                </select>
                <button onclick="logic.init()" class="w-full bg-emerald-500 p-5 rounded-2xl font-black mt-4">BAŞLAT</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-2xl flex flex-col h-screen overflow-hidden">
        <header class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="ui.toggleProfile(true)">
                <div id="avatar" class="w-12 h-12 bg-emerald-500/20 border border-emerald-500/30 rounded-2xl flex items-center justify-center font-black text-emerald-500"></div>
                <div>
                    <h2 id="display-name" class="font-bold text-sm tracking-tight italic">--</h2>
                    <p id="display-bmi" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">BMI: --</p>
                </div>
            </div>
            <div class="flex gap-1.5" id="nav-dots"></div>
        </header>

        <div class="card-wrapper" id="card-stack"></div>

        <footer class="p-6 pb-10 flex flex-col items-center gap-4">
            <div id="action-area" class="w-full flex justify-between gap-4"></div>
            <p id="logic-feedback" class="text-[10px] text-gray-500 font-black uppercase tracking-widest"></p>
        </footer>
    </div>

    <script>
        const logic = {
            user: JSON.parse(localStorage.getItem('h_v5_user')),
            status: JSON.parse(localStorage.getItem('h_v5_status')) || { day: 1, meals: [0,0,0,0,0] },
            currentIdx: 0,

            getMealData() {
                const isM = this.user?.gender === 'male';
                const w = this.user?.weight || 70;
                return [
                    { h: 7, m: 30, t: "Sabah Kardiyosu", d: "Aç Karnına 20dk Yürüyüş", list: ["500ml Alkali Su (Limonlu)", "Opsiyonel: Sade Filtre Kahve"], note: "Yağ yakımı için insülini düşük tutuyoruz.", icon: "fa-running" },
                    { h: 9, m: 0, t: "Kahvaltı", d: "Yüksek Proteinli Başlangıç", 
                      list: isM ? [`${Math.round(w*1.5)}g Lor Peyniri`, "3 Haşlanmış Yumurta", "Bol Yeşillik", "5 Zeytin"] : [`${Math.round(w*1.2)}g Lor Peyniri`, "2 Haşlanmış Yumurta", "Maydanoz & Dereotu"],
                      note: "Kolin, karaciğer hücre zarını onarır.", icon: "fa-egg" },
                    { h: 13, m: 0, t: "Öğle Yemeği", d: "Kas Koruyucu & KC Dostu", 
                      list: isM ? ["200g Izgara Tavuk/Hindi", "1 Tabak Haşlama Sebze", "Az Yağlı Yoğurt"] : ["120g Izgara Protein", "Mevsim Salatası", "1 Kase Yoğurt"],
                      note: "Lifli gıdalar toksinleri süpürür.", icon: "fa-utensils" },
                    { h: 16, m: 30, t: "Detoks Arası", d: "Antioksidan Bombası", 
                      list: ["3 Tam Ceviz", "1 Fincan Yeşil Çay", "1 Dilim Limon"],
                      note: "E vitamini karaciğer yağlanmasını frenler.", icon: "fa-leaf" },
                    { h: 19, m: 30, t: "Akşam Yemeği", d: "Rejenerasyon Kapanışı", 
                      list: ["1 Orta Boy Enginar", "4 Kaşık Zeytinyağlı Sebze", "Bol Limonlu Roka"],
                      note: "Gece boyu karaciğerin kendini temizlemesini sağlar.", icon: "fa-moon" }
                ];
            },

            init() {
                const name = document.getElementById('uName').value;
                const weight = document.getElementById('uWeight').value;
                const height = document.getElementById('uHeight').value;
                if(!name || !weight || !height) return alert("Eksik bilgi!");
                this.user = { name, gender: document.getElementById('uGender').value, weight: parseInt(weight), height: parseInt(height) };
                localStorage.setItem('h_v5_user', JSON.stringify(this.user));
                this.render();
            },

            updateProfile() {
                this.user.name = document.getElementById('edit-name').value;
                this.user.weight = parseInt(document.getElementById('edit-weight').value);
                this.user.height = parseInt(document.getElementById('edit-height').value);
                localStorage.setItem('h_v5_user', JSON.stringify(this.user));
                ui.toggleProfile(false);
                this.render();
            },

            render() {
                if(!this.user) return;
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-name').innerText = this.user.name.toUpperCase();
                document.getElementById('avatar').innerText = this.user.name[0];
                
                const bmi = (this.user.weight / ((this.user.height/100)**2)).toFixed(1);
                document.getElementById('display-bmi').innerText = `BMI: ${bmi} (${this.getBMICat(bmi)})`;
                
                this.updateCards();
                this.updateDots();
                this.updateControls();
            },

            getBMICat(bmi) {
                if(bmi < 18.5) return "Zayıf";
                if(bmi < 25) return "Normal";
                if(bmi < 30) return "Kilolu";
                return "Obez";
            },

            updateCards() {
                const container = document.getElementById('card-stack');
                container.innerHTML = '';
                const meals = this.getMealData();
                const allDone = this.status.meals.every(m => m === 1);

                if (allDone && this.currentIdx === meals.length) {
                    this.renderReport(container); return;
                }

                meals.forEach((meal, i) => {
                    const card = document.createElement('div');
                    card.className = `meal-card glass ${i === this.currentIdx ? 'active' : (i < this.currentIdx ? 'prev' : 'next')}`;
                    card.innerHTML = `
                        ${this.status.meals[i] ? '<div class="absolute top-6 right-6 bg-emerald-500 text-[10px] font-black px-3 py-1 rounded-full shadow-lg">TAMAM</div>' : ''}
                        <div class="flex justify-between items-center mb-6">
                            <span class="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-xl text-[10px] font-black">${meal.h}:${meal.m}</span>
                            <i class="fas ${meal.icon} opacity-20"></i>
                        </div>
                        <h3 class="text-2xl font-black mb-1 uppercase italic">${meal.t}</h3>
                        <p class="text-emerald-400 font-bold text-xs mb-6">${meal.d}</p>
                        
                        <div class="flex-1 overflow-y-auto scroll-custom space-y-4">
                            <div class="bg-white/5 p-4 rounded-3xl">
                                <p class="text-[9px] text-gray-500 font-black uppercase mb-3 tracking-widest">Alınacak Besinler</p>
                                <ul class="space-y-2">
                                    ${meal.list.map(item => `<li class="text-xs flex items-center gap-2"><i class="fas fa-check text-[8px] text-emerald-500"></i> ${item}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="bg-emerald-500/5 p-4 rounded-3xl border-l-2 border-emerald-500 italic text-[11px] text-gray-300">
                                ${meal.note}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            },

            renderReport(container) {
                const card = document.createElement('div');
                card.className = 'meal-card active glass p-8 text-center items-center justify-center';
                card.innerHTML = `
                    <div class="w-16 h-16 bg-emerald-500 rounded-3xl flex items-center justify-center shadow-2xl mb-6"><i class="fas fa-award text-2xl"></i></div>
                    <h3 class="text-2xl font-black mb-2 italic">GÜN BİTTİ!</h3>
                    <p class="text-xs text-gray-400 mb-8">Karaciğerin bugün için sana teşekkür ediyor. Rejenerasyon süreci uykuda devam edecek.</p>
                    <button onclick="logic.nextDay()" class="w-full bg-white text-black p-5 rounded-2xl font-black uppercase text-xs tracking-widest">YARINA GEÇİŞ YAP</button>
                `;
                container.appendChild(card);
            },

            updateDots() {
                const container = document.getElementById('nav-dots');
                container.innerHTML = this.status.meals.map((s, i) => `
                    <div class="w-1.5 h-1.5 rounded-full transition-all ${i === this.currentIdx ? 'bg-emerald-500 w-4' : (s === 1 ? 'bg-sapphire' : 'bg-white/10')}"></div>
                `).join('');
            },

            updateControls() {
                const area = document.getElementById('action-area');
                if(this.currentIdx >= 5) return;
                const isDone = this.status.meals[this.currentIdx] === 1;
                area.innerHTML = `
                    <button onclick="logic.move(-1)" class="w-14 h-14 rounded-2xl glass flex items-center justify-center text-gray-400"><i class="fas fa-arrow-left"></i></button>
                    <button onclick="logic.setStatus(${isDone ? 0 : 1})" class="flex-1 ${isDone ? 'bg-rose-500/10 text-rose-500' : 'bg-emerald-500 text-white'} p-5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">
                        ${isDone ? 'GERİ AL' : 'TAMAMLADIM!'}
                    </button>
                    <button onclick="logic.move(1)" class="w-14 h-14 rounded-2xl glass flex items-center justify-center text-gray-400"><i class="fas fa-arrow-right"></i></button>
                `;
                document.getElementById('logic-feedback').innerText = this.getMealData()[this.currentIdx].t;
            },

            setStatus(val) {
                this.status.meals[this.currentIdx] = val;
                localStorage.setItem('h_v5_status', JSON.stringify(this.status));
                if(val === 1 && this.currentIdx < 5) this.currentIdx++;
                this.render();
            },

            move(dir) {
                const target = this.currentIdx + dir;
                if(target >= 0 && target <= 5) { this.currentIdx = target; this.render(); }
            },

            nextDay() {
                this.status.day++;
                this.status.meals = [0,0,0,0,0];
                this.currentIdx = 0;
                localStorage.setItem('h_v5_status', JSON.stringify(this.status));
                location.reload();
            }
        };

        const ui = {
            toggleProfile(show) {
                const modal = document.getElementById('profile-modal');
                if(show) {
                    document.getElementById('edit-name').value = logic.user.name;
                    document.getElementById('edit-weight').value = logic.user.weight;
                    document.getElementById('edit-height').value = logic.user.height;
                    modal.classList.add('open');
                } else {
                    modal.classList.remove('open');
                }
            }
        };

        if(logic.user) logic.render();
    </script>
</body>
</html>
