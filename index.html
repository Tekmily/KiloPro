<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepatoFit Elite - Swipe & Track</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #10b981; --rose: #f43f5e; --dark: #0f172a; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        
        /* Kart Kaydırma Alanı */
        #card-container { position: relative; height: 450px; width: 100%; max-width: 350px; margin: 0 auto; perspective: 1000px; }
        .swipe-card { 
            position: absolute; width: 100%; height: 100%; 
            transition: transform 0.5s ease, opacity 0.5s ease;
            cursor: grab; user-select: none; touch-action: none;
        }
        .swipe-card:active { cursor: grabbing; }
        
        .status-overlay {
            position: absolute; top: 20px; padding: 10px 20px; border-radius: 10px; font-weight: 900; 
            font-size: 2rem; border: 4px solid; opacity: 0; transform: rotate(-20deg);
        }
        .status-yes { left: 20px; color: var(--emerald); border-color: var(--emerald); }
        .status-no { right: 20px; color: var(--rose); border-color: var(--rose); transform: rotate(20deg); }

        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--emerald); transition: width 0.3s ease; }
    </style>
</head>
<body class="p-4">

    <div id="setup-screen" class="max-w-md mx-auto glass p-8 mt-10">
        <h1 class="text-3xl font-black text-emerald-500 mb-6 italic text-center uppercase tracking-tighter">HepatoFit Elite</h1>
        <div class="space-y-4">
            <input type="text" id="uName" placeholder="Adınız" class="w-full p-4 rounded-2xl bg-slate-800 border-none outline-none">
            <select id="uGender" class="w-full p-4 rounded-2xl bg-slate-800 border-none">
                <option value="male">Erkek (Testosteron & Kas Odaklı)</option>
                <option value="female">Kadın (Hormon & Metabolizma Odaklı)</option>
            </select>
            <div class="flex gap-4">
                <input type="number" id="uWeight" placeholder="Kilo" class="w-1/2 p-4 rounded-2xl bg-slate-800">
                <input type="number" id="uHeight" placeholder="Boy" class="w-1/2 p-4 rounded-2xl bg-slate-800">
            </div>
            <button onclick="initApp()" class="w-full bg-emerald-500 p-4 rounded-2xl font-black shadow-lg">BAŞLAT</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden max-w-lg mx-auto space-y-6">
        
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="avatar" src="" class="w-12 h-12 rounded-full border-2 border-emerald-500">
                <div>
                    <h2 id="displayName" class="font-bold">--</h2>
                    <p class="text-[10px] text-emerald-400 uppercase tracking-widest font-bold">Grade 1/2 Koruma Modu</p>
                </div>
            </div>
            <button onclick="toggleBesin()" class="glass p-3 text-xs font-bold text-emerald-400">BESİN LİSTESİ</button>
        </div>

        <div class="text-center">
            <p id="task-counter" class="text-xs text-gray-500 font-bold mb-2 uppercase tracking-widest">GÖREV 1 / 5</p>
            <div id="card-container">
                </div>
        </div>

        <div class="flex justify-center gap-8 items-center mt-4">
            <button onclick="swipe('left')" class="w-16 h-16 rounded-full bg-rose-500/20 text-rose-500 text-2xl border border-rose-500/30 hover:bg-rose-500 hover:text-white transition"><i class="fas fa-times"></i></button>
            <button onclick="swipe('right')" class="w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-500 text-2xl border border-emerald-500/30 hover:bg-emerald-500 hover:text-white transition"><i class="fas fa-check"></i></button>
        </div>

        <div id="besin-modal" class="hidden fixed inset-0 z-50 bg-black/90 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold italic">BESİN DEĞİŞİM KARTI</h3>
                <button onclick="toggleBesin()" class="text-2xl">&times;</button>
            </div>
            <div id="besin-content" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('hepatoSwipeUser'));
        let tasks = [
            { h: 7, m: 30, t: "Aç Karnına Kardiyo", d: "20dk Yürüyüş - Yağ yakımını başlatır.", img: "fa-running" },
            { h: 9, m: 0, t: "Yüksek Proteinli Kahvaltı", d: "Yumurta + Lor - Karaciğer dostu.", img: "fa-egg" },
            { h: 13, m: 0, t: "Sebze & Protein Öğle", d: "Izgara Tavuk & Salata - Fruktozsuz.", img: "fa-utensils" },
            { h: 16, m: 30, t: "Metabolik Ara Öğün", d: "Yeşil Çay & 3 Ceviz - Enzim desteği.", img: "fa-leaf" },
            { h: 19, m: 0, t: "Hafif Akşam Yemeği", d: "Zeytinyağlı Enginar - Karaciğer temizliği.", img: "fa-moon" }
        ];

        let currentIdx = 0;

        function initApp() {
            const data = {
                name: document.getElementById('uName').value,
                gender: document.getElementById('uGender').value,
                weight: document.getElementById('uWeight').value,
                height: document.getElementById('uHeight').value
            };
            if(!data.name) return;
            localStorage.setItem('hepatoSwipeUser', JSON.stringify(data));
            user = data;
            renderDashboard();
        }

        function renderDashboard() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('displayName').innerText = user.name;
            document.getElementById('avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.gender === 'male' ? 'Felix' : 'Aneka'}`;
            loadCards();
        }

        function loadCards() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';
            tasks.forEach((task, i) => {
                if(i < currentIdx) return;
                const card = document.createElement('div');
                card.className = 'swipe-card glass p-8 flex flex-col items-center justify-center text-center gap-6 shadow-2xl';
                card.style.zIndex = tasks.length - i;
                card.style.transform = `scale(${1 - (i - currentIdx) * 0.05}) translateY(${(i - currentIdx) * 15}px)`;
                
                card.innerHTML = `
                    <div class="status-overlay status-yes">YAPTIM</div>
                    <div class="status-overlay status-no">PAS</div>
                    <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center text-4xl text-emerald-500 border border-emerald-500/30">
                        <i class="fas ${task.img}"></i>
                    </div>
                    <div>
                        <span class="bg-white/10 px-4 py-1 rounded-full text-xs font-mono font-bold">${String(task.h).padStart(2,'0')}:${String(task.m).padStart(2,'0')}</span>
                        <h3 class="text-2xl font-black mt-4">${task.t}</h3>
                        <p class="text-gray-400 text-sm mt-2">${task.d}</p>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('task-counter').innerText = `GÖREV ${currentIdx + 1} / ${tasks.length}`;
        }

        function swipe(dir) {
            const activeTask = tasks[currentIdx];
            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();
            const taskMins = activeTask.h * 60 + activeTask.m;

            // Zaman Kontrolü
            if(dir === 'right' && currentMins < taskMins - 15) {
                alert(`⚠️ Sabırlı ol ${user.name}! Bu görevin saati ${activeTask.h}:${activeTask.m}. Etkili sonuç için zamanında yapmalısın.`);
                return;
            }

            const card = document.querySelector('.swipe-card');
            if(!card) return;

            if(dir === 'right') {
                card.style.transform = 'translateX(500px) rotate(30deg)';
                card.querySelector('.status-yes').style.opacity = '1';
            } else {
                card.style.transform = 'translateX(-500px) rotate(-30deg)';
                card.querySelector('.status-no').style.opacity = '1';
            }
            card.style.opacity = '0';

            setTimeout(() => {
                currentIdx++;
                if(currentIdx >= tasks.length) {
                    alert("Tebrikler! Günlük planı tamamladın. Yarın görüşürüz!");
                    currentIdx = 0;
                }
                loadCards();
            }, 500);
        }

        function toggleBesin() {
            const modal = document.getElementById('besin-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                const isMale = user.gender === 'male';
                document.getElementById('besin-content').innerHTML = `
                    <div class="glass p-6 border-l-4 border-emerald-500">
                        <h4 class="text-emerald-400 font-bold mb-2">PRO-PROTEİN LİSTESİ (${isMale ? 'Erkek' : 'Kadın'})</h4>
                        <ul class="text-sm space-y-2 opacity-80">
                            <li>• ${isMale ? '180g Dana/Tavuk (Kas Koruması)' : '120g Hindi/Tavuk (Hafif Sindirim)'}</li>
                            <li>• 2-3 Yumurta Beyazı (Saf Albümin)</li>
                            <li>• 1 Kase Lor Peyniri (Karaciğer Rejenerasyonu)</li>
                        </ul>
                    </div>
                    <div class="glass p-6 border-l-4 border-rose-500">
                        <h4 class="text-rose-500 font-bold mb-2">FRUKTOZ & YASAKLAR</h4>
                        <ul class="text-sm space-y-2 opacity-80">
                            <li>• Kesinlikle Paket Meyve Suyu YOK!</li>
                            <li>• Beyaz Ekmek / Hamur İşi (Grade 1 Tetikleyici)</li>
                            <li>• Akşam 20:00'den sonra meyve tüketimi sınırlı.</li>
                        </ul>
                    </div>
                `;
            }
        }

        if(user) renderDashboard();
    </script>
</body>
</html>
