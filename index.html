<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>3D Arcade Runner (Bundle)</title>
  <meta name="color-scheme" content="dark" />
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#0b1020; }
    #app { position:relative; width:100%; height:100%; touch-action:none; }
    canvas { display:block; width:100%; height:100%; }

    #hud {
      position:absolute; left:0; right:0; top:0;
      display:flex; justify-content:center; pointer-events:none;
      padding: env(safe-area-inset-top) 0 0 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    #countBox {
      margin-top: 14px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 10px 14px;
      color: white;
      letter-spacing: .2px;
      display:flex; align-items:center; gap:10px;
      transform-origin:center;
    }
    #countLabel { opacity:.8; font-size:13px; }
    #countValue { font-weight:800; font-size:22px; }

    .pop { animation: pop .22s ease-out; }
    @keyframes pop { 0%{transform:scale(1)} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }

    #hint {
      position:absolute; left:0; right:0; bottom:0;
      display:flex; justify-content:center; pointer-events:none;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: rgba(255,255,255,.65);
      font-size: 12px;
    }
    #hint > div {
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
    }

    #loading {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: rgba(255,255,255,.75);
      pointer-events:none;
    }
    #loading.hidden { display:none; }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="countBox">
        <div id="countLabel">SoldierCount</div>
        <div id="countValue">10</div>
      </div>
    </div>
    <div id="hint"><div>Drag/Swipe ile sağa-sola hareket ✋</div></div>
    <div id="loading">Yükleniyor…</div>
  </div>

  <!-- Single-file build: bundle.js (modules bundled) -->
  <script type="module" src="./bundle.js"></script>
</body>
</html>
