<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepatoFit Elite - Logic Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #10b981; --rose: #f43f5e; --dark: #0f172a; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        
        .card-stack { position: relative; width: 100%; max-width: 400px; height: 550px; margin: 0 auto; }
        .meal-card { 
            position: absolute; width: 100%; height: 100%; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: none; /* Sadece aktif olan gösterilecek */
        }
        .meal-card.active { display: block; z-index: 20; opacity: 1; transform: scale(1); }
        .meal-card.prev { display: block; z-index: 10; opacity: 0.5; transform: scale(0.9) translateX(-100%); }
        .meal-card.next { display: block; z-index: 10; opacity: 0.5; transform: scale(0.9) translateX(100%); }

        .approved-stamp {
            position: absolute; top: 20px; right: 20px;
            transform: rotate(15deg); border: 4px solid var(--emerald);
            color: var(--emerald); padding: 5px 15px; font-weight: 900;
            border-radius: 10px; z-index: 30; background: rgba(15, 23, 42, 0.9);
        }
        
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .progress-dot.done { background: var(--emerald); box-shadow: 0 0 10px var(--emerald); }
        .progress-dot.active { transform: scale(1.5); background: white; }
    </style>
</head>
<body class="flex flex-col h-screen p-4">

    <div id="setup-screen" class="fixed inset-0 z-[100] bg-[#0f172a] p-8 flex items-center justify-center">
        <div class="w-full max-w-md glass p-8 text-center">
            <h1 class="text-3xl font-black text-emerald-500 mb-6 italic tracking-tighter">HEPATOFIT <span class="text-white">PRO</span></h1>
            <div class="space-y-4 text-left">
                <input type="text" id="uName" placeholder="Adınız" class="w-full p-4 rounded-2xl bg-slate-800 outline-none border border-white/5">
                <select id="uGender" class="w-full p-4 rounded-2xl bg-slate-800 border-none outline-none">
                    <option value="male">Erkek (Kas Korumalı Diyet)</option>
                    <option value="female">Kadın (Hormon Dengeli Diyet)</option>
                </select>
                <button onclick="initApp()" class="w-full bg-emerald-500 p-4 rounded-2xl font-black text-white shadow-lg">SİSTEMİ KUR</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex-1 flex flex-col">
        <header class="flex justify-between items-center py-4 px-2">
            <div>
                <h2 id="userName" class="text-xl font-black">--</h2>
                <p class="text-[10px] text-emerald-400 font-bold uppercase">Karaciğer Yağlanması Grade 1/2 Rehberi</p>
            </div>
            <div id="dots-container" class="flex gap-2"></div>
        </header>

        <main class="flex-1 flex items-center justify-center relative">
            <button onclick="prevCard()" class="absolute left-0 z-50 p-2 text-gray-500 hover:text-white"><i class="fas fa-chevron-left text-2xl"></i></button>
            
            <div id="card-stack" class="card-stack">
                </div>

            <button onclick="nextCard()" class="absolute right-0 z-50 p-2 text-gray-500 hover:text-white"><i class="fas fa-chevron-right text-2xl"></i></button>
        </main>

        <footer class="py-8 space-y-4">
            <div id="action-controls" class="flex justify-center gap-6">
                </div>
            <p class="text-center text-[10px] text-gray-500 italic">Kartlar arasında geçiş yapmak için kenarlardaki okları veya kaydırmayı kullanın.</p>
        </footer>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('hepatoLogicUser'));
        let mealStates = JSON.parse(localStorage.getItem('mealStates')) || [0,0,0,0,0]; // 0: Bekliyor, 1: Yapıldı
        let currentIdx = 0;

        const getMeals = (gender) => [
            { h: 7, m: 30, title: "Aç Karnına Kardiyo", detail: "20dk Tempolu Yürüyüş", protein: "Su / Filtre Kahve", note: "Yağ yakımını maksimize eder.", icon: "fa-running" },
            { h: 9, m: 0, title: "Pro-Kahvaltı", detail: gender === 'male' ? "3 Yumurta + 100g Lor" : "2 Yumurta + 50g Lor", protein: "Yüksek Protein", note: "Karaciğer hücre yenilenmesi için kolin içerir.", icon: "fa-egg" },
            { h: 13, m: 0, title: "Öğle Yemeği", detail: gender === 'male' ? "180g Izgara Et + Salata" : "120g Izgara Et + Salata", protein: "Fruktoz 0%", note: "Nişasta ve fruktozdan kaçınılan ana öğün.", icon: "fa-utensils" },
            { h: 16, m: 30, title: "Metabolik Ara", detail: "3 Tam Ceviz + Yeşil Çay", protein: "Omega-3", note: "Karaciğer enzimlerini dengeler.", icon: "fa-leaf" },
            { h: 19, m: 30, title: "KC-Detoks Akşam", detail: "Zeytinyağlı Enginar", protein: "Sinarin", note: "Karaciğeri toksinlerden arındırır.", icon: "fa-moon" }
        ];

        function initApp() {
            const name = document.getElementById('uName').value;
            const gender = document.getElementById('uGender').value;
            if(!name) return;
            user = { name, gender };
            localStorage.setItem('hepatoLogicUser', JSON.stringify(user));
            renderApp();
        }

        function renderApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('userName').innerText = user.name;
            updateCards();
            updateDots();
            updateControls();
        }

        function updateCards() {
            const container = document.getElementById('card-stack');
            container.innerHTML = '';
            const meals = getMeals(user.gender);

            meals.forEach((meal, i) => {
                const card = document.createElement('div');
                card.className = `meal-card glass p-8 flex flex-col ${i === currentIdx ? 'active' : (i < currentIdx ? 'prev' : 'next')}`;
                
                const isDone = mealStates[i] === 1;

                card.innerHTML = `
                    ${isDone ? '<div class="approved-stamp font-black text-xs">ONAYLANDI <i class="fas fa-check"></i></div>' : ''}
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-full text-sm font-black">${String(meal.h).padStart(2,'0')}:${String(meal.m).padStart(2,'0')}</span>
                        <i class="fas ${meal.icon} text-3xl opacity-20"></i>
                    </div>
                    <h3 class="text-3xl font-black mb-2 uppercase tracking-tighter">${meal.title}</h3>
                    <p class="text-emerald-400 font-bold mb-4">${meal.detail}</p>
                    
                    <div class="space-y-4 flex-1">
                        <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                            <p class="text-[10px] uppercase font-bold text-gray-500 mb-1 tracking-widest">Temel İçerik</p>
                            <p class="text-sm font-medium text-white">${meal.protein}</p>
                        </div>
                        <div class="bg-emerald-500/5 border-l-4 border-emerald-500 p-4 rounded-r-2xl">
                            <p class="text-[10px] uppercase font-bold text-emerald-500 mb-1">Diyetisyen Notu</p>
                            <p class="text-xs italic text-gray-300 leading-relaxed">${meal.note}</p>
                        </div>
                        <div class="bg-rose-500/10 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-rose-400 mb-1 uppercase tracking-widest">Karaciğer Uyarısı</p>
                            <p class="text-[10px] text-gray-400">Bu öğünde yapay tatlandırıcı, paketli meyve suyu ve beyaz un yasaktır.</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = mealStates.map((s, i) => 
                `<div class="progress-dot ${s === 1 ? 'done' : ''} ${i === currentIdx ? 'active' : ''}"></div>`
            ).join('');
        }

        function updateControls() {
            const controls = document.getElementById('action-controls');
            const isDone = mealStates[currentIdx] === 1;

            if (isDone) {
                controls.innerHTML = `
                    <button onclick="changeStatus(0)" class="bg-rose-500/20 text-rose-500 border border-rose-500/30 px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-rose-500 hover:text-white transition">İptal Et / Yeniden Oyla</button>
                `;
            } else {
                controls.innerHTML = `
                    <button onclick="changeStatus(1)" class="bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-emerald-500/20 hover:scale-105 transition active:scale-95">YAPTIM!</button>
                    <button onclick="nextCard()" class="bg-white/5 text-gray-400 px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-sm border border-white/10">PAS GEÇ</button>
                `;
            }
        }

        function changeStatus(val) {
            const meals = getMeals(user.gender);
            const m = meals[currentIdx];
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const mealTime = m.h * 60 + m.m;

            if (val === 1 && currentTime < mealTime - 15) {
                alert(`⚠️ Zamanlama Hatası! \n\n${m.title} öğünü için saatin gelmesini beklemelisin (${m.h}:${m.m}). Karaciğerin bu disipline ihtiyacı var.`);
                return;
            }

            mealStates[currentIdx] = val;
            localStorage.setItem('mealStates', JSON.stringify(mealStates));
            updateCards();
            updateDots();
            updateControls();
        }

        function nextCard() {
            if (currentIdx < mealStates.length - 1) {
                currentIdx++;
                updateCards();
                updateDots();
                updateControls();
            }
        }

        function prevCard() {
            if (currentIdx > 0) {
                currentIdx--;
                updateCards();
                updateDots();
                updateControls();
            }
        }

        // Swipe Support (Basit)
        let touchStart = 0;
        document.addEventListener('touchstart', e => touchStart = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let touchEnd = e.changedTouches[0].clientX;
            if (touchStart - touchEnd > 80) nextCard();
            if (touchEnd - touchStart > 80) prevCard();
        });

        if(user) renderApp();
    </script>
</body>
</html>
