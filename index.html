<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepatoFit Elite - AI Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #10b981; --rose: #f43f5e; --dark: #0f172a; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        
        .card-stack { position: relative; width: 100%; max-width: 400px; height: 580px; margin: 0 auto; }
        .meal-card { 
            position: absolute; width: 100%; height: 100%; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
        }
        .meal-card.active { display: block; z-index: 20; opacity: 1; transform: scale(1); }
        .meal-card.prev { display: block; z-index: 10; opacity: 0; transform: translateX(-100%) rotate(-10deg); }
        .meal-card.next { display: block; z-index: 10; opacity: 0; transform: translateX(100%) rotate(10deg); }

        .approved-stamp {
            position: absolute; top: 20px; right: 20px; transform: rotate(15deg); 
            border: 4px solid var(--emerald); color: var(--emerald); padding: 5px 15px; 
            font-weight: 900; border-radius: 10px; z-index: 30; background: rgba(15, 23, 42, 0.9);
        }
        
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); }
        .progress-dot.done { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
        .progress-dot.active { transform: scale(1.6); background: white; }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .report-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body class="flex flex-col h-screen p-4">

    <div id="setup-screen" class="fixed inset-0 z-[100] bg-[#0f172a] p-8 flex items-center justify-center hidden">
        <div class="w-full max-w-md glass p-8 text-center">
            <h1 class="text-3xl font-black text-emerald-500 mb-6 italic tracking-tighter uppercase">HepatoFit Login</h1>
            <div class="space-y-4">
                <input type="text" id="uName" placeholder="Adınız" class="w-full p-4 rounded-2xl bg-slate-800 outline-none border border-white/5">
                <select id="uGender" class="w-full p-4 rounded-2xl bg-slate-800 outline-none">
                    <option value="male">Erkek</option>
                    <option value="female">Kadın</option>
                </select>
                <input type="number" id="uWeight" placeholder="Kilonuz (kg)" class="w-full p-4 rounded-2xl bg-slate-800 outline-none">
                <button onclick="initApp()" class="w-full bg-emerald-500 p-4 rounded-2xl font-black text-white shadow-xl">BAŞLAT</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex-1 flex flex-col">
        <header class="flex justify-between items-center py-6 px-2">
            <div>
                <h2 id="userName" class="text-xl font-black italic">--</h2>
                <p id="day-counter" class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">GÜN 1</p>
            </div>
            <div id="dots-container" class="flex gap-2"></div>
        </header>

        <main class="flex-1 flex items-center justify-center relative">
            <div id="card-stack" class="card-stack">
                </div>
        </main>

        <footer class="py-10">
            <div id="action-controls" class="flex flex-col items-center gap-4">
                </div>
        </footer>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('hepatoAI_User'));
        let dayStatus = JSON.parse(localStorage.getItem('hepatoAI_DayStatus')) || { day: 1, meals: [0,0,0,0,0] };
        let currentIdx = 0;

        const getMeals = (gender) => [
            { h: 7, m: 30, title: "Aç Karnına Kardiyo", cal: 250, desc: "20dk Yürüyüş", note: "Sabah açlığı karaciğer yağ asitlerini yakar.", icon: "fa-running" },
            { h: 9, m: 0, title: "Protein Kahvaltısı", cal: 350, desc: gender === 'male' ? "3 Yumurta + Lor" : "2 Yumurta + Lor", note: "Yumurta sarısındaki kolin KC temizliği yapar.", icon: "fa-egg" },
            { h: 13, m: 0, title: "Öğle Yemeği", cal: 450, desc: "Izgara Protein + Yeşillik", note: "Fruktoz 0. İnsülin direnci kontrolü.", icon: "fa-utensils" },
            { h: 16, m: 30, title: "Ara Öğün", cal: 150, desc: "Yeşil Çay + 3 Ceviz", note: "Antioksidan desteği karaciğeri korur.", icon: "fa-leaf" },
            { h: 19, m: 30, title: "Akşam Detoksu", cal: 300, desc: "Enginar veya Mevsim Sebzesi", note: "Sinarin maddesi safra akışını hızlandırır.", icon: "fa-moon" }
        ];

        function initApp() {
            const name = document.getElementById('uName').value;
            const gender = document.getElementById('uGender').value;
            const weight = document.getElementById('uWeight').value;
            if(!name || !weight) return;
            user = { name, gender, weight: parseInt(weight) };
            localStorage.setItem('hepatoAI_User', JSON.stringify(user));
            renderApp();
        }

        function renderApp() {
            if(!user) { document.getElementById('setup-screen').classList.remove('hidden'); return; }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('userName').innerText = user.name;
            document.getElementById('day-counter').innerText = `${dayStatus.day}. GÜN RAPORU`;
            updateCards();
            updateDots();
            updateControls();
        }

        function updateCards() {
            const container = document.getElementById('card-stack');
            container.innerHTML = '';
            const meals = getMeals(user.gender);
            const allDone = dayStatus.meals.every(m => m === 1);

            // TÜM KARTLAR BİTTİĞİNDE GRAFİK EKRANI
            if (allDone && currentIdx === meals.length) {
                renderAnalysis(container);
                return;
            }

            meals.forEach((meal, i) => {
                const card = document.createElement('div');
                card.className = `meal-card glass p-8 flex flex-col ${i === currentIdx ? 'active' : (i < currentIdx ? 'prev' : 'next')}`;
                const isDone = dayStatus.meals[i] === 1;

                card.innerHTML = `
                    ${isDone ? '<div class="approved-stamp">TAMAMLANDI</div>' : ''}
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-full text-xs font-black">${meal.time || String(meal.h).padStart(2,'0')+':'+String(meal.m).padStart(2,'0')}</span>
                        <i class="fas ${meal.icon} text-3xl opacity-10"></i>
                    </div>
                    <h3 class="text-3xl font-black mb-2 uppercase italic tracking-tighter">${meal.title}</h3>
                    <p class="text-emerald-400 font-bold mb-4">${meal.desc}</p>
                    <div class="space-y-4 flex-1 overflow-y-auto">
                        <div class="bg-emerald-500/5 border-l-2 border-emerald-500 p-4 rounded-r-2xl text-xs italic text-gray-300">${meal.note}</div>
                        <div class="p-4 rounded-2xl border border-white/5 text-[10px] text-gray-400">
                           <b class="text-white">Fruktoz Sınırı:</b> Grade 1/2 için bu öğünde meyve şekeri tüketilmedi. Karaciğer yükü %0.
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderAnalysis(container) {
            const meals = getMeals(user.gender);
            const totalCal = meals.reduce((sum, m) => sum + m.cal, 0);
            const burnedCal = Math.round(user.weight * 5); // Temsili yakılan kalori
            
            const card = document.createElement('div');
            card.className = 'meal-card active glass p-6 flex flex-col overflow-y-auto w-full';
            card.innerHTML = `
                <h3 class="text-2xl font-black text-center mb-4 uppercase italic">GÜNLÜK ANALİZ RAPORU</h3>
                <canvas id="dailyChart" class="mb-6" style="max-height: 180px;"></canvas>
                
                <div class="report-grid mb-6">
                    <div class="report-item">
                        <p class="text-[10px] text-gray-400 uppercase font-bold">Yakılan Kalori</p>
                        <p class="text-xl font-black text-emerald-400">~${burnedCal + 250} kcal</p>
                    </div>
                    <div class="report-item">
                        <p class="text-[10px] text-gray-400 uppercase font-bold">KC Detoks Puanı</p>
                        <p class="text-xl font-black text-blue-400">9.4/10</p>
                    </div>
                </div>

                <div class="space-y-4 text-xs leading-relaxed text-gray-300">
                    <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20">
                        <p class="font-bold text-white mb-1"><i class="fas fa-microscope mr-2 text-emerald-500"></i> AI Analiz Sonucu:</p>
                        Bugün fruktoz alımını sıfırlayarak karaciğerindeki yağ asidi oksidasyonunu <b>%18 artırdın.</b> Sabah yaptığın aç kardiyo sayesinde insülin duyarlılığın optimize edildi.
                    </div>
                    <div class="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20">
                        <p class="font-bold text-white mb-1"><i class="fas fa-info-circle mr-2 text-blue-500"></i> Grade 1/2 Durumu:</p>
                        Disiplinli protein alımı sayesinde karaciğer rejenerasyonu (hücre yenilenmesi) devam ediyor. Haftalık hedefin olan <b>3.5kg</b> kaybına bir adım daha yaklaştın.
                    </div>
                </div>
                
                <button onclick="nextDay()" class="mt-6 w-full bg-emerald-500 py-4 rounded-2xl font-black text-white shadow-xl">YARINA HAZIRLAN</button>
            `;
            container.appendChild(card);

            // Grafik Çizimi
            const ctx = document.getElementById('dailyChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Protein', 'Lif', 'Yağ'],
                    datasets: [{
                        data: [45, 35, 20],
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: 'white', font: { size: 10 } } } } }
            });

            document.getElementById('action-controls').innerHTML = '';
        }

        function updateDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = dayStatus.meals.map((s, i) => 
                `<div class="progress-dot ${s === 1 ? 'done' : ''} ${i === currentIdx ? 'active' : ''}"></div>`
            ).join('');
        }

        function updateControls() {
            const controls = document.getElementById('action-controls');
            if(currentIdx >= 5) return;

            const isDone = dayStatus.meals[currentIdx] === 1;
            if (isDone) {
                controls.innerHTML = `<button onclick="setStatus(0)" class="text-rose-500 text-xs font-bold uppercase tracking-widest border border-rose-500/30 px-6 py-3 rounded-xl">İşlemi Geri Al</button>`;
            } else {
                controls.innerHTML = `
                    <button onclick="setStatus(1)" class="w-64 bg-emerald-500 py-4 rounded-2xl font-black text-white shadow-lg">ÖĞÜNÜ ONAYLA</button>
                    <div class="flex gap-10 mt-4">
                        <button onclick="prevCard()" class="text-gray-500"><i class="fas fa-chevron-left mr-2"></i> Geri</button>
                        <button onclick="nextCard()" class="text-gray-500">İleri <i class="fas fa-chevron-right ml-2"></i></button>
                    </div>
                `;
            }
        }

        function setStatus(val) {
            const meals = getMeals(user.gender);
            const m = meals[currentIdx];
            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();
            const mealMins = m.h * 60 + m.m;

            if (val === 1 && currentMins < mealMins - 15) {
                alert(`⚠️ Zamanlama Hatası!\n\n${m.title} için henüz erken. Karaciğer biyolojik saatine uyarak ${m.h}:${m.m} saatinde onayla.`);
                return;
            }

            dayStatus.meals[currentIdx] = val;
            localStorage.setItem('hepatoAI_DayStatus', JSON.stringify(dayStatus));
            
            if (val === 1 && currentIdx < 5) currentIdx++;
            
            updateCards();
            updateDots();
            updateControls();
        }

        function nextDay() {
            dayStatus.day++;
            dayStatus.meals = [0,0,0,0,0];
            currentIdx = 0;
            localStorage.setItem('hepatoAI_DayStatus', JSON.stringify(dayStatus));
            location.reload();
        }

        function nextCard() { if (currentIdx < 5) { currentIdx++; updateCards(); updateDots(); updateControls(); } }
        function prevCard() { if (currentIdx > 0) { currentIdx--; updateCards(); updateDots(); updateControls(); } }

        renderApp();
    </script>
</body>
</html>
